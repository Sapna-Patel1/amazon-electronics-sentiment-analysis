model:
  name: facebook/bart-large-cnn
  max_input_tokens: 1024
  max_summary_length: 130
  min_summary_length: 30
  num_beams: 4
  length_penalty: 2.0
  no_repeat_ngram_size: 3

data:
  processed_path: data/processed/preprocessed_reviews.csv
  product_column: parent_asin
  product_title_column: product_title
  review_title_column: review_title
  review_text_column: text
  rating_column: rating
  sentiment_column: sentiment
  input_text_column: input_text
  helpful_vote_column: helpful_vote

  # Reviews included per sentiment group.
  reviews_per_group: 3

  # Keep at 1 while testing on CPU.
  sample_products: 20

outputs:
  summary_path: outputs/summary_samples.csv
  evaluation_path: outputs/summary_evaluation.csv
  comparison_path: outputs/strategy_comparison.csv