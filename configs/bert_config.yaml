model:
  name: bert-base-uncased
  num_labels: 3
  max_length: 256

training:
  learning_rate: 2.0e-5
  batch_size: 16
  num_epochs: 3
  warmup_steps: 500
  weight_decay: 0.01
  seed: 42
  # RQ2 class-balancing experiment: when true, the loss is weighted by
  # inverse class frequency (computed from the train split at runtime).
  # Run once with this false (baseline) and once true (weighted), then
  # compare neutral-class F1/recall between the two runs.
  use_class_weights: false

data:
  processed_path: data/processed/preprocessed_reviews.csv
  train_path: data/processed/train.csv
  val_path: data/processed/validation.csv
  test_path: data/processed/test.csv

outputs:
  model_dir: models/bert_sentiment
  results_dir: outputs/
  num_sample_predictions: 10
