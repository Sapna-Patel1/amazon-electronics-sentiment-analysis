model:
  name: bert-base-uncased
  num_labels: 3
  max_length: 256

training:
  learning_rate: 2e-5
  batch_size: 16
  num_epochs: 3
  warmup_steps: 500
  weight_decay: 0.01
  seed: 42

data:
  processed_path: data/processed/preprocessed_reviews.csv
  train_path: data/processed/train.csv
  val_path: data/processed/validation.csv
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  label_map:
    negative: 0
    neutral: 1
    positive: 2

outputs:
  model_dir: models/bert_sentiment
  results_dir: outputs/
